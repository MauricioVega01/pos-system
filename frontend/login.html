<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Bajón del Descanso — Acceso</title>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --rojo: #D72B2B;
      --rojo-oscuro: #A81E1E;
      --amarillo: #F5C518;
      --negro: #111111;
      --gris-oscuro: #1E1E1E;
      --gris-medio: #2C2C2C;
      --gris-claro: #3A3A3A;
      --texto: #F0F0F0;
      --texto-suave: #A0A0A0;
    }

    body {
      font-family: 'Inter', sans-serif;
      background: var(--negro);
      color: var(--texto);
      height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }

    .login-box {
      background: var(--gris-oscuro);
      border: 1px solid var(--gris-claro);
      border-radius: 12px;
      padding: 40px;
      width: 100%;
      max-width: 380px;
    }

    .login-logo {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 32px;
      letter-spacing: 2px;
      color: var(--amarillo);
      text-align: center;
      margin-bottom: 6px;
    }

    .login-subtitulo {
      font-size: 12px;
      color: var(--texto-suave);
      text-align: center;
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-bottom: 32px;
    }

    .campo {
      margin-bottom: 16px;
    }

    .campo label {
      display: block;
      font-size: 12px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: var(--texto-suave);
      margin-bottom: 6px;
    }

    .campo input {
      width: 100%;
      background: var(--gris-medio);
      border: 1px solid var(--gris-claro);
      border-radius: 6px;
      padding: 10px 14px;
      color: var(--texto);
      font-size: 14px;
      font-family: 'Inter', sans-serif;
      transition: border-color 0.15s;
    }

    .campo input:focus {
      outline: none;
      border-color: var(--amarillo);
    }

    .btn-login {
      width: 100%;
      padding: 12px;
      background: var(--rojo);
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      margin-top: 8px;
      transition: background 0.15s;
      letter-spacing: 0.5px;
    }

    .btn-login:hover { background: var(--rojo-oscuro); }

    .error {
      font-size: 13px;
      color: var(--rojo);
      text-align: center;
      margin-top: 14px;
      min-height: 20px;
    }

    .divisor {
      height: 1px;
      background: var(--gris-claro);
      margin: 24px 0;
    }

    .btn-caja {
      width: 100%;
      padding: 10px;
      background: transparent;
      color: var(--texto-suave);
      border: 1px solid var(--gris-claro);
      border-radius: 8px;
      font-size: 13px;
      cursor: pointer;
      transition: all 0.15s;
    }

    .btn-caja:hover {
      border-color: var(--amarillo);
      color: var(--amarillo);
    }
  </style>
</head>
<body>

<div class="login-box">
  <div class="login-logo">Bajon del Descanso</div>
  <div class="login-subtitulo">Panel de administracion</div>

  <div class="campo">
    <label>Usuario</label>
    <input type="text" id="username" placeholder="Ingresa tu usuario" />
  </div>

  <div class="campo">
    <label>Contrasena</label>
    <input type="password" id="password" placeholder="Ingresa tu contrasena" />
  </div>

  <button class="btn-login" onclick="login()">Ingresar</button>
  <div class="error" id="error"></div>

  <div class="divisor"></div>

  <button class="btn-caja" onclick="window.location.href='index.html'">Ir a la caja</button>
</div>

<script>
  const API = 'http://127.0.0.1:8000';

  if (localStorage.getItem('token')) {
    window.location.href = 'admin.html';
  }

  async function login() {
    const username = document.getElementById('username').value.trim();
    const password = document.getElementById('password').value;
    const errorEl = document.getElementById('error');

    if (!username || !password) {
      errorEl.textContent = 'Completa todos los campos';
      return;
    }

    try {
      const res = await fetch(`${API}/auth/login`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ username, password })
      });

      const data = await res.json();

      if (res.ok) {
        localStorage.setItem('token', data.access_token);
        window.location.href = 'admin.html';
      } else {
        errorEl.textContent = data.detail || 'Credenciales incorrectas';
      }
    } catch (e) {
      errorEl.textContent = 'No se pudo conectar con el servidor';
    }
  }

  document.addEventListener('keydown', e => {
    if (e.key === 'Enter') login();
  });
</script>
</body>
</html>
