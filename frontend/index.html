<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Bajón del Descanso — Caja</title>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --rojo: #D72B2B;
      --rojo-oscuro: #A81E1E;
      --amarillo: #F5C518;
      --amarillo-oscuro: #C9A00F;
      --negro: #111111;
      --gris-oscuro: #1E1E1E;
      --gris-medio: #2C2C2C;
      --gris-claro: #3A3A3A;
      --texto: #F0F0F0;
      --texto-suave: #A0A0A0;
      --blanco: #FFFFFF;
    }

    body {
      font-family: 'Inter', sans-serif;
      background: var(--negro);
      color: var(--texto);
      height: 100vh;
      display: grid;
      grid-template-rows: 56px 1fr;
      overflow: hidden;
    }

    header {
      background: var(--rojo);
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 24px;
      border-bottom: 3px solid var(--amarillo);
    }

    header h1 {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 28px;
      letter-spacing: 2px;
      color: var(--amarillo);
    }

    header span {
      font-size: 13px;
      color: rgba(255,255,255,0.7);
    }

    .layout {
      display: grid;
      grid-template-columns: 1fr 340px;
      overflow: hidden;
    }

    .productos-panel {
      display: flex;
      flex-direction: column;
      overflow: hidden;
      border-right: 1px solid var(--gris-claro);
    }

    .panel-header {
      padding: 16px 24px 12px;
      border-bottom: 1px solid var(--gris-claro);
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .panel-header h2 {
      font-size: 13px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: var(--texto-suave);
    }

    .categorias {
      display: flex;
      gap: 8px;
      padding: 12px 24px;
      border-bottom: 1px solid var(--gris-claro);
      overflow-x: auto;
    }

    .categorias::-webkit-scrollbar { display: none; }

    .cat-btn {
      padding: 6px 14px;
      border-radius: 20px;
      border: 1px solid var(--gris-claro);
      background: transparent;
      color: var(--texto-suave);
      font-size: 12px;
      font-weight: 500;
      cursor: pointer;
      white-space: nowrap;
      transition: all 0.15s;
    }

    .cat-btn:hover, .cat-btn.active {
      background: var(--amarillo);
      border-color: var(--amarillo);
      color: var(--negro);
    }

    .productos-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
      gap: 12px;
      padding: 16px 24px;
      overflow-y: auto;
    }

    .productos-grid::-webkit-scrollbar { width: 4px; }
    .productos-grid::-webkit-scrollbar-track { background: transparent; }
    .productos-grid::-webkit-scrollbar-thumb { background: var(--gris-claro); border-radius: 2px; }

    .producto-card {
      background: var(--gris-medio);
      border: 1px solid var(--gris-claro);
      border-radius: 8px;
      padding: 14px;
      cursor: pointer;
      transition: all 0.15s;
      position: relative;
    }

    .producto-card:hover {
      border-color: var(--amarillo);
      transform: translateY(-1px);
    }

    .producto-card:active { transform: translateY(0); }

    .producto-card.sin-stock {
      opacity: 0.4;
      cursor: not-allowed;
    }

    .producto-nombre {
      font-size: 13px;
      font-weight: 600;
      margin-bottom: 6px;
      line-height: 1.3;
    }

    .producto-precio {
      font-size: 16px;
      font-weight: 600;
      color: var(--amarillo);
      font-family: 'Bebas Neue', sans-serif;
      letter-spacing: 1px;
    }

    .producto-stock {
      font-size: 11px;
      color: var(--texto-suave);
      margin-top: 4px;
    }

    .stock-badge {
      position: absolute;
      top: 8px;
      right: 8px;
      background: var(--rojo);
      color: white;
      font-size: 10px;
      font-weight: 600;
      padding: 2px 6px;
      border-radius: 10px;
    }

    .loading {
      grid-column: 1 / -1;
      text-align: center;
      padding: 40px;
      color: var(--texto-suave);
      font-size: 14px;
    }

    .carro-panel {
      display: flex;
      flex-direction: column;
      background: var(--gris-oscuro);
    }

    .carro-header {
      padding: 16px 20px 12px;
      border-bottom: 1px solid var(--gris-claro);
    }

    .carro-header h2 {
      font-size: 13px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: var(--texto-suave);
    }

    .carro-items {
      flex: 1;
      overflow-y: auto;
      padding: 12px 16px;
    }

    .carro-items::-webkit-scrollbar { width: 3px; }
    .carro-items::-webkit-scrollbar-thumb { background: var(--gris-claro); }

    .carro-vacio {
      text-align: center;
      padding: 40px 20px;
      color: var(--texto-suave);
      font-size: 13px;
      line-height: 1.6;
    }

    .carro-item {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px 0;
      border-bottom: 1px solid var(--gris-claro);
    }

    .carro-item:last-child { border-bottom: none; }

    .item-info { flex: 1; }

    .item-nombre {
      font-size: 13px;
      font-weight: 500;
      margin-bottom: 2px;
    }

    .item-precio {
      font-size: 12px;
      color: var(--texto-suave);
    }

    .item-controles {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .ctrl-btn {
      width: 26px;
      height: 26px;
      border-radius: 50%;
      border: 1px solid var(--gris-claro);
      background: transparent;
      color: var(--texto);
      font-size: 16px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.1s;
      line-height: 1;
    }

    .ctrl-btn:hover { background: var(--rojo); border-color: var(--rojo); }

    .item-cantidad {
      font-size: 14px;
      font-weight: 600;
      min-width: 20px;
      text-align: center;
    }

    .item-subtotal {
      font-size: 16px;
      font-weight: 600;
      color: var(--amarillo);
      min-width: 70px;
      text-align: right;
      font-family: 'Bebas Neue', sans-serif;
      letter-spacing: 0.5px;
    }

    .carro-footer {
      padding: 16px 20px;
      border-top: 1px solid var(--gris-claro);
    }

    .total-row {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      margin-bottom: 14px;
    }

    .total-label {
      font-size: 13px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: var(--texto-suave);
    }

    .total-monto {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 32px;
      color: var(--amarillo);
      letter-spacing: 1px;
    }

    .btn-cobrar {
      width: 100%;
      padding: 14px;
      background: var(--rojo);
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.15s;
      letter-spacing: 0.5px;
    }

    .btn-cobrar:hover { background: var(--rojo-oscuro); }
    .btn-cobrar:disabled { opacity: 0.4; cursor: not-allowed; }

    .btn-limpiar {
      width: 100%;
      padding: 8px;
      background: transparent;
      color: var(--texto-suave);
      border: 1px solid var(--gris-claro);
      border-radius: 8px;
      font-size: 13px;
      cursor: pointer;
      margin-top: 8px;
      transition: all 0.15s;
    }

    .btn-limpiar:hover { border-color: var(--rojo); color: var(--rojo); }

    .toast {
      position: fixed;
      bottom: 24px;
      left: 50%;
      transform: translateX(-50%) translateY(100px);
      background: #1a1a1a;
      border: 1px solid var(--amarillo);
      color: var(--texto);
      padding: 12px 24px;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 500;
      transition: transform 0.3s ease;
      z-index: 100;
    }

    .toast.show { transform: translateX(-50%) translateY(0); }
    .toast.error { border-color: var(--rojo); }
  </style>
</head>
<body>

<header>
  <h1>Bajon del Descanso</h1>
  <span id="fecha"></span>
</header>

<div class="layout">

  <div class="productos-panel">
    <div class="panel-header">
      <h2>Menu</h2>
    </div>
    <div class="categorias" id="categorias"></div>
    <div class="productos-grid" id="productos-grid">
      <div class="loading">Cargando menu...</div>
    </div>
  </div>

  <div class="carro-panel">
    <div class="carro-header">
      <h2>Pedido actual</h2>
    </div>
    <div class="carro-items" id="carro-items">
      <div class="carro-vacio">Agrega productos<br>desde el menu</div>
    </div>
    <div class="carro-footer">
      <div class="total-row">
        <span class="total-label">Total</span>
        <span class="total-monto" id="total">$0</span>
      </div>
      <button class="btn-cobrar" id="btn-cobrar" disabled onclick="cobrar()">Registrar venta</button>
      <button class="btn-limpiar" onclick="limpiarCarro()">Limpiar pedido</button>
    </div>
  </div>

</div>

<div class="toast" id="toast"></div>

<script>
  const API = 'http://127.0.0.1:8000';
  let productos = [];
  let carro = {};
  let categoriaActiva = 'Todos';

  const categorias = ['Todos', 'Vienesas', 'Ass', 'Churrascos', 'Pizza', 'Empanadas', 'Papas fritas', 'Bebestibles'];

  const fecha = new Date();
  document.getElementById('fecha').textContent = fecha.toLocaleDateString('es-CL', { weekday: 'long', day: 'numeric', month: 'long' });

  function renderCategorias() {
    const el = document.getElementById('categorias');
    el.innerHTML = categorias.map(c => `
      <button class="cat-btn ${c === categoriaActiva ? 'active' : ''}" onclick="filtrarCategoria('${c}')">${c}</button>
    `).join('');
  }

  function filtrarCategoria(cat) {
    categoriaActiva = cat;
    renderCategorias();
    renderProductos();
  }

  async function cargarProductos() {
    try {
      const res = await fetch(`${API}/products/`);
      productos = await res.json();
      renderProductos();
    } catch (e) {
      document.getElementById('productos-grid').innerHTML = `<div class="loading">No se pudo conectar con el servidor.</div>`;
    }
  }

  function renderProductos() {
    const grid = document.getElementById('productos-grid');
    let lista = productos;

    if (categoriaActiva !== 'Todos') {
      lista = productos.filter(p =>
        p.name.toLowerCase().includes(categoriaActiva.toLowerCase()) ||
        (p.description && p.description.toLowerCase().includes(categoriaActiva.toLowerCase()))
      );
    }

    if (lista.length === 0) {
      grid.innerHTML = `<div class="loading">No hay productos en esta categoria.</div>`;
      return;
    }

    grid.innerHTML = lista.map(p => `
      <div class="producto-card ${p.stock === 0 ? 'sin-stock' : ''}" onclick="${p.stock > 0 ? `agregarAlCarro('${p._id}')` : ''}">
        ${p.stock <= 5 && p.stock > 0 ? `<span class="stock-badge">Ultimos ${p.stock}</span>` : ''}
        <div class="producto-nombre">${p.name}</div>
        <div class="producto-precio">$${Number(p.price).toLocaleString('es-CL')}</div>
        <div class="producto-stock">${p.stock === 0 ? 'Sin stock' : `Stock: ${p.stock}`}</div>
      </div>
    `).join('');
  }

  function agregarAlCarro(id) {
    const producto = productos.find(p => p._id === id);
    if (!producto) return;

    if (carro[id]) {
      if (carro[id].cantidad >= producto.stock) {
        mostrarToast(`Stock maximo: ${producto.stock}`, true);
        return;
      }
      carro[id].cantidad++;
    } else {
      carro[id] = { ...producto, cantidad: 1 };
    }

    renderCarro();
    mostrarToast(`${producto.name} agregado`);
  }

  function cambiarCantidad(id, delta) {
    if (!carro[id]) return;
    carro[id].cantidad += delta;
    if (carro[id].cantidad <= 0) delete carro[id];
    renderCarro();
  }

  function renderCarro() {
    const el = document.getElementById('carro-items');
    const items = Object.values(carro);

    if (items.length === 0) {
      el.innerHTML = `<div class="carro-vacio">Agrega productos<br>desde el menu</div>`;
      document.getElementById('total').textContent = '$0';
      document.getElementById('btn-cobrar').disabled = true;
      return;
    }

    el.innerHTML = items.map(item => `
      <div class="carro-item">
        <div class="item-info">
          <div class="item-nombre">${item.name}</div>
          <div class="item-precio">$${Number(item.price).toLocaleString('es-CL')} c/u</div>
        </div>
        <div class="item-controles">
          <button class="ctrl-btn" onclick="cambiarCantidad('${item._id}', -1)">−</button>
          <span class="item-cantidad">${item.cantidad}</span>
          <button class="ctrl-btn" onclick="cambiarCantidad('${item._id}', 1)">+</button>
        </div>
        <div class="item-subtotal">$${Number(item.price * item.cantidad).toLocaleString('es-CL')}</div>
      </div>
    `).join('');

    const total = items.reduce((acc, i) => acc + i.price * i.cantidad, 0);
    document.getElementById('total').textContent = `$${Number(total).toLocaleString('es-CL')}`;
    document.getElementById('btn-cobrar').disabled = false;
  }

  function limpiarCarro() {
    carro = {};
    renderCarro();
  }

  async function cobrar() {
    const items = Object.values(carro);
    if (items.length === 0) return;

    const body = {
      items: items.map(i => ({ product_id: i._id, quantity: i.cantidad }))
    };

    try {
      const res = await fetch(`${API}/sales/`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(body)
      });

      const data = await res.json();

      if (res.ok) {
        mostrarToast(`Venta registrada — Total: $${Number(data.total).toLocaleString('es-CL')}`);
        carro = {};
        renderCarro();
        cargarProductos();
      } else {
        mostrarToast(data.detail || 'Error al registrar la venta', true);
      }
    } catch (e) {
      mostrarToast('Error de conexion con el servidor', true);
    }
  }

  function mostrarToast(msg, error = false) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.className = `toast show ${error ? 'error' : ''}`;
    setTimeout(() => t.className = 'toast', 3000);
  }

  renderCategorias();
  cargarProductos();
</script>
</body>
</html>
