<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Bajón del Descanso — Admin</title>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --rojo: #D72B2B;
      --rojo-oscuro: #A81E1E;
      --amarillo: #F5C518;
      --negro: #111111;
      --gris-oscuro: #1E1E1E;
      --gris-medio: #2C2C2C;
      --gris-claro: #3A3A3A;
      --texto: #F0F0F0;
      --texto-suave: #A0A0A0;
    }

    body {
      font-family: 'Inter', sans-serif;
      background: var(--negro);
      color: var(--texto);
      min-height: 100vh;
    }

    header {
      background: var(--rojo);
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 24px;
      height: 56px;
      border-bottom: 3px solid var(--amarillo);
    }

    header h1 {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 28px;
      letter-spacing: 2px;
      color: var(--amarillo);
    }

    header a {
      font-size: 13px;
      color: rgba(255,255,255,0.8);
      text-decoration: none;
      border: 1px solid rgba(255,255,255,0.3);
      padding: 6px 14px;
      border-radius: 6px;
      transition: all 0.15s;
    }

    header a:hover { background: rgba(255,255,255,0.1); }

    .container {
      max-width: 1100px;
      margin: 0 auto;
      padding: 32px 24px;
    }

    /* RESUMEN */
    .resumen {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 16px;
      margin-bottom: 40px;
    }

    .resumen-card {
      background: var(--gris-medio);
      border: 1px solid var(--gris-claro);
      border-radius: 8px;
      padding: 20px 24px;
    }

    .resumen-label {
      font-size: 12px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: var(--texto-suave);
      margin-bottom: 8px;
    }

    .resumen-valor {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 36px;
      color: var(--amarillo);
      letter-spacing: 1px;
    }

    /* SECCIONES */
    .seccion {
      margin-bottom: 48px;
    }

    .seccion-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 20px;
      padding-bottom: 12px;
      border-bottom: 1px solid var(--gris-claro);
    }

    .seccion-header h2 {
      font-size: 13px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: var(--texto-suave);
    }

    /* FORMULARIO */
    .form-grid {
      display: grid;
      grid-template-columns: 2fr 2fr 1fr 1fr auto;
      gap: 10px;
      margin-bottom: 24px;
      background: var(--gris-medio);
      padding: 16px;
      border-radius: 8px;
      border: 1px solid var(--gris-claro);
    }

    .form-grid input {
      background: var(--gris-oscuro);
      border: 1px solid var(--gris-claro);
      border-radius: 6px;
      padding: 8px 12px;
      color: var(--texto);
      font-size: 13px;
      font-family: 'Inter', sans-serif;
      transition: border-color 0.15s;
    }

    .form-grid input:focus {
      outline: none;
      border-color: var(--amarillo);
    }

    .form-grid input::placeholder { color: var(--texto-suave); }

    .btn {
      padding: 8px 16px;
      border-radius: 6px;
      border: none;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.15s;
      white-space: nowrap;
    }

    .btn-primary { background: var(--amarillo); color: var(--negro); }
    .btn-primary:hover { background: var(--amarillo-oscuro, #C9A00F); }

    .btn-danger { background: transparent; color: var(--rojo); border: 1px solid var(--rojo); }
    .btn-danger:hover { background: var(--rojo); color: white; }

    .btn-edit { background: transparent; color: var(--texto-suave); border: 1px solid var(--gris-claro); }
    .btn-edit:hover { border-color: var(--amarillo); color: var(--amarillo); }

    /* TABLA */
    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 13px;
    }

    th {
      text-align: left;
      padding: 10px 14px;
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: var(--texto-suave);
      border-bottom: 1px solid var(--gris-claro);
    }

    td {
      padding: 12px 14px;
      border-bottom: 1px solid var(--gris-claro);
      vertical-align: middle;
    }

    tr:last-child td { border-bottom: none; }
    tr:hover td { background: var(--gris-medio); }

    .precio-cell { color: var(--amarillo); font-family: 'Bebas Neue', sans-serif; font-size: 16px; }

    .acciones { display: flex; gap: 8px; }

    /* VENTAS */
    .venta-card {
      background: var(--gris-medio);
      border: 1px solid var(--gris-claro);
      border-radius: 8px;
      padding: 16px 20px;
      margin-bottom: 10px;
    }

    .venta-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 10px;
    }

    .venta-id { font-size: 11px; color: var(--texto-suave); }

    .venta-total {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 22px;
      color: var(--amarillo);
    }

    .venta-items { font-size: 12px; color: var(--texto-suave); line-height: 1.8; }

    /* MODAL EDICION */
    .modal-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.7);
      z-index: 100;
      align-items: center;
      justify-content: center;
    }

    .modal-overlay.show { display: flex; }

    .modal {
      background: var(--gris-oscuro);
      border: 1px solid var(--gris-claro);
      border-radius: 10px;
      padding: 28px;
      width: 420px;
    }

    .modal h3 {
      font-size: 14px;
      font-weight: 600;
      margin-bottom: 20px;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: var(--texto-suave);
    }

    .modal-form { display: flex; flex-direction: column; gap: 12px; }

    .modal-form input {
      background: var(--gris-medio);
      border: 1px solid var(--gris-claro);
      border-radius: 6px;
      padding: 10px 14px;
      color: var(--texto);
      font-size: 13px;
      font-family: 'Inter', sans-serif;
    }

    .modal-form input:focus { outline: none; border-color: var(--amarillo); }

    .modal-actions { display: flex; gap: 10px; margin-top: 8px; }
    .modal-actions .btn { flex: 1; padding: 10px; }

    .empty { text-align: center; padding: 32px; color: var(--texto-suave); font-size: 13px; }

    .toast {
      position: fixed;
      bottom: 24px;
      left: 50%;
      transform: translateX(-50%) translateY(100px);
      background: #1a1a1a;
      border: 1px solid var(--amarillo);
      color: var(--texto);
      padding: 12px 24px;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 500;
      transition: transform 0.3s ease;
      z-index: 200;
    }

    .toast.show { transform: translateX(-50%) translateY(0); }
    .toast.error { border-color: var(--rojo); }
  </style>
</head>
<body>

<header>
  <h1>Bajon del Descanso — Admin</h1>
  <a href="index.html">Ir a Caja</a>
</header>

<div class="container">

  <!-- RESUMEN -->
  <div class="resumen">
    <div class="resumen-card">
      <div class="resumen-label">Total recaudado hoy</div>
      <div class="resumen-valor" id="total-dia">$0</div>
    </div>
    <div class="resumen-card">
      <div class="resumen-label">Ventas registradas</div>
      <div class="resumen-valor" id="total-ventas">0</div>
    </div>
    <div class="resumen-card">
      <div class="resumen-label">Productos en menu</div>
      <div class="resumen-valor" id="total-productos">0</div>
    </div>
  </div>

  <!-- PRODUCTOS -->
  <div class="seccion">
    <div class="seccion-header">
      <h2>Productos</h2>
    </div>

    <div class="form-grid">
      <input type="text" id="inp-nombre" placeholder="Nombre del producto" />
      <input type="text" id="inp-descripcion" placeholder="Categoria" />
      <input type="number" id="inp-precio" placeholder="Precio" />
      <input type="number" id="inp-stock" placeholder="Stock" />
      <button class="btn btn-primary" onclick="agregarProducto()">Agregar</button>
    </div>

    <table>
      <thead>
        <tr>
          <th>Producto</th>
          <th>Categoria</th>
          <th>Precio</th>
          <th>Stock</th>
          <th>Acciones</th>
        </tr>
      </thead>
      <tbody id="tabla-productos">
        <tr><td colspan="5" class="empty">Cargando...</td></tr>
      </tbody>
    </table>
  </div>

  <!-- VENTAS -->
  <div class="seccion">
    <div class="seccion-header">
      <h2>Ventas del dia</h2>
    </div>
    <div id="lista-ventas">
      <div class="empty">Cargando...</div>
    </div>
  </div>

</div>

<!-- MODAL EDICION -->
<div class="modal-overlay" id="modal">
  <div class="modal">
    <h3>Editar producto</h3>
    <div class="modal-form">
      <input type="text" id="edit-nombre" placeholder="Nombre" />
      <input type="text" id="edit-descripcion" placeholder="Categoria" />
      <input type="number" id="edit-precio" placeholder="Precio" />
      <input type="number" id="edit-stock" placeholder="Stock" />
    </div>
    <div class="modal-actions">
      <button class="btn btn-edit" onclick="cerrarModal()">Cancelar</button>
      <button class="btn btn-primary" onclick="guardarEdicion()">Guardar</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
  const API = 'http://127.0.0.1:8000';
  let productos = [];
  let editandoId = null;

  async function cargarDatos() {
    await Promise.all([cargarProductos(), cargarVentas()]);
  }

  async function cargarProductos() {
    try {
      const res = await fetch(`${API}/products/`);
      productos = await res.json();
      renderProductos();
      document.getElementById('total-productos').textContent = productos.length;
    } catch(e) {
      document.getElementById('tabla-productos').innerHTML = '<tr><td colspan="5" class="empty">Error al cargar productos</td></tr>';
    }
  }

  function renderProductos() {
    const tbody = document.getElementById('tabla-productos');
    if (productos.length === 0) {
      tbody.innerHTML = '<tr><td colspan="5" class="empty">No hay productos</td></tr>';
      return;
    }
    tbody.innerHTML = productos.map(p => `
      <tr>
        <td>${p.name}</td>
        <td>${p.description}</td>
        <td class="precio-cell">$${Number(p.price).toLocaleString('es-CL')}</td>
        <td>${p.stock}</td>
        <td>
          <div class="acciones">
            <button class="btn btn-edit" onclick="abrirModal('${p._id}')">Editar</button>
            <button class="btn btn-danger" onclick="eliminarProducto('${p._id}')">Eliminar</button>
          </div>
        </td>
      </tr>
    `).join('');
  }

  async function agregarProducto() {
    const nombre = document.getElementById('inp-nombre').value.trim();
    const descripcion = document.getElementById('inp-descripcion').value.trim();
    const precio = parseFloat(document.getElementById('inp-precio').value);
    const stock = parseInt(document.getElementById('inp-stock').value);

    if (!nombre || !descripcion || isNaN(precio) || isNaN(stock)) {
      mostrarToast('Completa todos los campos', true);
      return;
    }

    const res = await fetch(`${API}/products/`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ name: nombre, description: descripcion, price: precio, stock: stock })
    });

    if (res.ok) {
      mostrarToast('Producto agregado');
      document.getElementById('inp-nombre').value = '';
      document.getElementById('inp-descripcion').value = '';
      document.getElementById('inp-precio').value = '';
      document.getElementById('inp-stock').value = '';
      cargarProductos();
    }
  }

  async function eliminarProducto(id) {
    if (!confirm('Eliminar este producto?')) return;
    const res = await fetch(`${API}/products/${id}`, { method: 'DELETE' });
    if (res.ok) {
      mostrarToast('Producto eliminado');
      cargarProductos();
    }
  }

  function abrirModal(id) {
    const p = productos.find(p => p._id === id);
    if (!p) return;
    editandoId = id;
    document.getElementById('edit-nombre').value = p.name;
    document.getElementById('edit-descripcion').value = p.description;
    document.getElementById('edit-precio').value = p.price;
    document.getElementById('edit-stock').value = p.stock;
    document.getElementById('modal').classList.add('show');
  }

  function cerrarModal() {
    document.getElementById('modal').classList.remove('show');
    editandoId = null;
  }

  async function guardarEdicion() {
    if (!editandoId) return;
    const body = {
      name: document.getElementById('edit-nombre').value,
      description: document.getElementById('edit-descripcion').value,
      price: parseFloat(document.getElementById('edit-precio').value),
      stock: parseInt(document.getElementById('edit-stock').value)
    };

    const res = await fetch(`${API}/products/${editandoId}`, {
      method: 'PUT',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(body)
    });

    if (res.ok) {
      mostrarToast('Producto actualizado');
      cerrarModal();
      cargarProductos();
    }
  }

  async function cargarVentas() {
    try {
      const res = await fetch(`${API}/sales/`);
      const ventas = await res.json();

      document.getElementById('total-ventas').textContent = ventas.length;

      const totalDia = ventas.reduce((acc, v) => acc + v.total, 0);
      document.getElementById('total-dia').textContent = `$${Number(totalDia).toLocaleString('es-CL')}`;

      const el = document.getElementById('lista-ventas');
      if (ventas.length === 0) {
        el.innerHTML = '<div class="empty">No hay ventas registradas hoy</div>';
        return;
      }

      el.innerHTML = ventas.reverse().map((v, i) => `
        <div class="venta-card">
          <div class="venta-header">
            <span class="venta-id">Venta #${ventas.length - i}</span>
            <span class="venta-total">$${Number(v.total).toLocaleString('es-CL')}</span>
          </div>
          <div class="venta-items">
            ${v.items.map(item => `${item.quantity}x ${item.name} — $${Number(item.subtotal).toLocaleString('es-CL')}`).join('<br>')}
          </div>
        </div>
      `).join('');
    } catch(e) {
      document.getElementById('lista-ventas').innerHTML = '<div class="empty">Error al cargar ventas</div>';
    }
  }

  function mostrarToast(msg, error = false) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.className = `toast show ${error ? 'error' : ''}`;
    setTimeout(() => t.className = 'toast', 3000);
  }

  cargarDatos();
</script>
</body>
</html>
